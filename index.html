<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yoheki-cad v0.1 (パラメトリック擁壁エディタ)</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Yu Gothic', 'Meiryo', sans-serif;
    margin: 0; padding: 0; background: #f3f3f3; color: #222;
    font-size: 13px;
  }
  
  /* ヘッダー */
  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
    color: white; padding: 10px 18px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .ver { font-size: 11px; opacity: 0.7; margin-left: 8px; }
  header .actions { display: flex; gap: 8px; }
  header button {
    background: rgba(255,255,255,0.15); color: white;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 6px 14px; border-radius: 4px;
    cursor: pointer; font-size: 12px; font-weight: 500;
  }
  header button:hover { background: rgba(255,255,255,0.25); }
  header button.primary { background: #f97316; border-color: #f97316; }
  header button.primary:hover { background: #ea580c; }
  
  /* メインレイアウト */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr 380px;
    gap: 0;
    height: calc(100vh - 50px);
  }
  
  /* 左サイドバー: パラメータ */
  .panel-left {
    background: white; border-right: 1px solid #ddd;
    overflow-y: auto; padding: 12px 14px;
  }
  
  .section-title {
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: #1e3a5f;
    border-bottom: 2px solid #1e3a5f;
    padding-bottom: 4px; margin-top: 16px; margin-bottom: 8px;
  }
  .section-title:first-child { margin-top: 0; }
  
  .param-row {
    display: grid;
    grid-template-columns: 1fr 90px 28px;
    align-items: center; gap: 6px;
    margin: 4px 0;
  }
  .param-row label { font-size: 12px; color: #444; }
  .param-row input[type="number"], .param-row select {
    width: 100%; padding: 4px 6px;
    border: 1px solid #bbb; border-radius: 3px;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .param-row input:focus, .param-row select:focus {
    outline: none; border-color: #2c5282; box-shadow: 0 0 0 2px rgba(44,82,130,0.2);
  }
  .param-row .unit { font-size: 11px; color: #888; }
  
  .preset-buttons { display: flex; gap: 4px; flex-wrap: wrap; margin: 6px 0; }
  .preset-buttons button {
    flex: 1; min-width: 60px;
    background: #f0f4f8; border: 1px solid #cbd5e0;
    padding: 5px 8px; border-radius: 3px;
    cursor: pointer; font-size: 11px;
  }
  .preset-buttons button:hover { background: #e2e8f0; }
  .preset-buttons button.active { background: #2c5282; color: white; border-color: #2c5282; }
  
  /* 中央: 図面表示 */
  .panel-center {
    background: #d9d9d9; padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
    overflow: auto;
  }
  .drawing-card {
    background: white;
    border: 1px solid #999;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    padding: 10px;
  }
  .drawing-card .card-title {
    font-size: 12px; font-weight: 700;
    border-bottom: 1px solid #ddd; padding-bottom: 4px; margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .drawing-card .card-title .scale { font-size: 10px; color: #666; font-weight: normal; }
  
  svg.dwg { display: block; width: 100%; height: auto; }
  
  /* 右サイドバー: 集計 */
  .panel-right {
    background: white; border-left: 1px solid #ddd;
    overflow-y: auto; padding: 12px 14px;
  }
  
  table.compact {
    width: 100%; border-collapse: collapse;
    font-size: 11.5px; margin: 6px 0;
  }
  table.compact th, table.compact td {
    border: 1px solid #ccc; padding: 4px 6px;
  }
  table.compact th {
    background: #ecf0f4; font-weight: 600; text-align: center;
    font-size: 11px;
  }
  table.compact td.r { text-align: right; font-variant-numeric: tabular-nums; }
  table.compact td.c { text-align: center; }
  table.compact tr.total { background: #fff9d0; font-weight: 700; }
  table.compact tr.grand { background: #fff0a0; font-weight: 700; }
  
  .summary-box {
    background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
    color: white; padding: 12px 14px; border-radius: 6px;
    margin: 10px 0;
  }
  .summary-box .label { font-size: 11px; opacity: 0.85; }
  .summary-box .value {
    font-size: 22px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
  }
  .summary-box .unit { font-size: 13px; opacity: 0.8; margin-left: 4px; }
  
  /* バリデーション警告 */
  .warning {
    background: #fff5e6; border-left: 4px solid #f59e0b;
    padding: 6px 10px; font-size: 11px; color: #92400e;
    margin: 6px 0; border-radius: 3px;
  }
  .error {
    background: #fee; border-left: 4px solid #c00;
    padding: 6px 10px; font-size: 11px; color: #800;
    margin: 6px 0; border-radius: 3px;
  }
  
  /* 印刷時 */
  @media print {
    .panel-left, .panel-right, header { display: none; }
    .panel-center { background: white; padding: 0; }
    .drawing-card { box-shadow: none; border: none; page-break-inside: avoid; }
  }
  
  /* スクロールバー */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }
</style>

        </tr>

<script>
// ============================================================
// 計算ロジック
// ============================================================

// 鉄筋の単位質量(kg/m)
const REBAR_WEIGHT = {
  "D10": 0.560, "D13": 0.995, "D16": 1.560,
  "D19": 2.250, "D22": 3.040, "D25": 3.980
};
const REBAR_DIA = {
  "D10": 10, "D13": 13, "D16": 16, "D19": 19, "D22": 22, "D25": 25
};

// パラメータ取得
function getParams() {
  return {
    H_total: parseFloat(document.getElementById('H_total').value),
    H_above: parseFloat(document.getElementById('H_above').value),
    Df: parseFloat(document.getElementById('Df').value),
    B: parseFloat(document.getElementById('B').value),
    slab_t: parseFloat(document.getElementById('slab_t').value),
    toe: parseFloat(document.getElementById('toe').value),
    L_total: parseFloat(document.getElementById('L_total').value),
    t_top: parseFloat(document.getElementById('t_top').value),
    t_bot: parseFloat(document.getElementById('t_bot').value),
    W1_dia: document.getElementById('W1_dia').value,
    W2_dia: document.getElementById('W2_dia').value,
    W3_dia: document.getElementById('W3_dia').value,
    wall_pitch: parseFloat(document.getElementById('wall_pitch').value),
    B1_dia: document.getElementById('B1_dia').value,
    B2_dia: document.getElementById('B2_dia').value,
    B3_dia: document.getElementById('B3_dia').value,
    slab_pitch: parseFloat(document.getElementById('slab_pitch').value),
    cover: parseFloat(document.getElementById('cover').value),
    cover_top: parseFloat(document.getElementById('cover_top').value),
    price_rebar: parseFloat(document.getElementById('price_rebar').value),
    price_conc: parseFloat(document.getElementById('price_conc').value),
    price_form: parseFloat(document.getElementById('price_form').value),
    price_stone: parseFloat(document.getElementById('price_stone').value)
  };
}

// 構造計算（座標生成）
function calcGeometry(p) {
  const heel = p.B - p.t_bot - p.toe;
  const wall_h = p.H_total - p.slab_t;
  
  // 基準座標 (SVG単位=mm)
  // 底版BL=(700, p.H_total + 400)
  const ox = 700, oy = 400;  // 構造体上端 = y=400, 下端 = y=400+H_total
  
  const slab_BL = [ox, oy + p.H_total];
  const slab_BR = [ox + p.B, oy + p.H_total];
  const slab_TR = [ox + p.B, oy + p.H_total - p.slab_t];
  const wall_back_bot = [ox + p.toe + p.t_bot, oy + p.H_total - p.slab_t];
  const wall_back_top = [ox + p.toe + p.t_bot, oy];
  const wall_top_front = [ox + p.toe + p.t_bot - p.t_top, oy];
  const wall_front_bot = [ox + p.toe, oy + p.H_total - p.slab_t];
  const slab_TL = [ox, oy + p.H_total - p.slab_t];
  
  // 前面斜面の単位法線ベクトル(壁内側)
  const dx = wall_top_front[0] - wall_front_bot[0];  // -300 (上が前に寄る)
  const dy = wall_top_front[1] - wall_front_bot[1];  // -3400
  const L = Math.sqrt(dx*dx + dy*dy);
  const nx = -dy/L, ny = dx/L;  // 90° CCW回転（壁内側を向く）
  // (壁内側 = +x方向であるべきなので符号確認)
  
  // W2 (前面主筋、テーパー追随、被り p.cover)
  const W2_top = [wall_top_front[0] + p.cover * nx, wall_top_front[1] + p.cover_top];
  const W2_bot = [wall_front_bot[0] + p.cover * nx, wall_front_bot[1] - p.cover];
  
  // W2底版定着位置（B1レベルへ）
  const B1_y = oy + p.H_total - p.slab_t + p.cover;
  // W2線をy=B1_yまで延長
  const t = (B1_y - W2_top[1]) / (W2_bot[1] - W2_top[1]);
  const W2_at_slab = [W2_top[0] + t*(W2_bot[0]-W2_top[0]), B1_y];
  const W2_anchor_end = [W2_at_slab[0] + 40*REBAR_DIA[p.W2_dia], B1_y];
  
  // W1 (背面主筋、鉛直、被りcover)
  const W1_x = wall_back_top[0] - p.cover;
  const W1_top_y = oy + p.cover_top;
  const W1_bot_y = oy + p.H_total - p.cover;
  const W1_anchor_end_x = W1_x + 40*REBAR_DIA[p.W1_dia];
  
  // B1 (底版上端筋、⊓型、両端90°曲げ)
  const B1_y_top = oy + p.H_total - p.slab_t + p.cover;
  const B1_y_bot = oy + p.H_total - p.cover;
  const B1_x_left = ox + p.cover;
  const B1_x_right = ox + p.B - p.cover;
  
  // B2 (底版下端筋、⊔型、両端90°曲げ)
  // 同じ範囲だが、形状が逆
  
  return {
    structure: [slab_BL, slab_BR, slab_TR, wall_back_bot, wall_back_top, 
                wall_top_front, wall_front_bot, slab_TL],
    wall_h: wall_h, heel: heel,
    ox: ox, oy: oy,
    nx: nx, ny: ny,
    W1: {top: [W1_x, W1_top_y], bot: [W1_x, W1_bot_y], anchor_end: [W1_anchor_end_x, W1_bot_y]},
    W2: {top: W2_top, bot: W2_at_slab, anchor_end: W2_anchor_end},
    B1: {x_left: B1_x_left, x_right: B1_x_right, y_top: B1_y_top, y_bot: B1_y_bot},
    B2: {x_left: B1_x_left, x_right: B1_x_right, y_top: B1_y_top, y_bot: B1_y_bot}
  };
}

// 鉄筋数量計算
function calcRebars(p, g) {
  const wall_h = p.H_total - p.slab_t;
  const n_wall = Math.ceil(p.L_total / p.wall_pitch);
  const n_slab = Math.ceil(p.L_total / p.slab_pitch);
  
  // W1 長さ: 上端フック(0.5d×8 ≈ 80mm) + 鉛直部 + 90°曲げ底版方向40d
  const W1_len = Math.round((g.W1.bot[1] - g.W1.top[1]) + 40*REBAR_DIA[p.W1_dia] + 80);
  
  // W2 長さ: 斜辺 + 定着40d + フック
  const dx = g.W2.bot[0] - g.W2.top[0];
  const dy = g.W2.bot[1] - g.W2.top[1];
  const slant = Math.sqrt(dx*dx + dy*dy);
  const W2_len = Math.round(slant + 40*REBAR_DIA[p.W2_dia] + 80);
  
  // W3 配力筋 (長手方向、全長 + 余長)
  const W3_len = p.L_total;
  const n_W3_layers = Math.ceil(wall_h / p.wall_pitch);
  const W3_count = n_W3_layers * 2;  // 両面
  
  // B1 ⊓型: 曲げ部(slab_t - cover×2)×2 + 水平部
  const B1_bend = p.slab_t - p.cover * 2;
  const B1_len = Math.round(B1_bend * 2 + (g.B1.x_right - g.B1.x_left));
  
  // B2 ⊔型: 同じ
  const B2_len = B1_len;
  
  // B3 底版配力筋（長手）
  const B3_len = p.L_total;
  const n_B3_layers = Math.ceil(p.B / p.slab_pitch / 2);
  const B3_count = n_B3_layers * 2;  // 上下
  
  return [
    {id:"W1", name:"竪壁背面主筋", dia:p.W1_dia, pitch:p.wall_pitch, 
     len:W1_len, count:n_wall, weight: W1_len/1000 * n_wall * REBAR_WEIGHT[p.W1_dia]},
    {id:"W2", name:"竪壁前面主筋(斜)", dia:p.W2_dia, pitch:p.wall_pitch, 
     len:W2_len, count:n_wall, weight: W2_len/1000 * n_wall * REBAR_WEIGHT[p.W2_dia]},
    {id:"W3", name:"竪壁配力筋", dia:p.W3_dia, pitch:p.wall_pitch, 
     len:W3_len, count:W3_count, weight: W3_len/1000 * W3_count * REBAR_WEIGHT[p.W3_dia]},
    {id:"B1", name:"底版上端(⊓型)", dia:p.B1_dia, pitch:p.slab_pitch, 
     len:B1_len, count:n_slab, weight: B1_len/1000 * n_slab * REBAR_WEIGHT[p.B1_dia]},
    {id:"B2", name:"底版下端(⊔型)", dia:p.B2_dia, pitch:p.slab_pitch, 
     len:B2_len, count:n_slab, weight: B2_len/1000 * n_slab * REBAR_WEIGHT[p.B2_dia]},
    {id:"B3", name:"底版配力筋", dia:p.B3_dia, pitch:p.slab_pitch, 
     len:B3_len, count:B3_count, weight: B3_len/1000 * B3_count * REBAR_WEIGHT[p.B3_dia]}
  ];
}

// 数量計算
function calcQuantities(p, g) {
  const wall_h = p.H_total - p.slab_t;
  
  // 壁体コンクリート (テーパー断面 × L)
  const wall_area = (p.t_top + p.t_bot) / 2 * wall_h / 1e6;
  const wall_conc = wall_area * p.L_total / 1000;
  
  // 底版コンクリート
  const slab_conc = p.B * p.slab_t / 1e6 * p.L_total / 1000;
  
  // 壁体型枠
  const front_len = Math.sqrt(wall_h*wall_h + (p.t_bot - p.t_top)*(p.t_bot - p.t_top));
  const wall_form = (front_len + wall_h + p.t_top) / 1000 * p.L_total / 1000;
  
  // 底版型枠
  const slab_form = p.slab_t / 1000 * 2 * p.L_total / 1000;
  
  // 栗石フィルター
  const heel = p.B - p.t_bot - p.toe;
  const filter_h = wall_h - 250 - 50;  // 天端250下から、キャップ50考慮
  const filter_vol = heel / 1000 * filter_h / 1000 * p.L_total / 1000;
  
  // 砕石基礎
  const crushed_stone = (p.B + 300) / 1000 * 0.4 * p.L_total / 1000;
  
  // 捨コン
  const sutekon = (p.B + 200) / 1000 * 0.05 * p.L_total / 1000;
  
  // キャップコン
  const cap_conc = heel / 1000 * 0.05 * p.L_total / 1000;
  
  // 根切り
  const excavation = (p.B + 400) / 1000 * (p.Df + p.slab_t + 50 + 400) / 1000 * p.L_total / 1000;
  
  return [
    {name:"根切り", unit:"m³", val: excavation},
    {name:"砕石(C-40)", unit:"m³", val: crushed_stone},
    {name:"捨てコン(t=50)", unit:"m³", val: sutekon},
    {name:"コンクリート本体", unit:"m³", val: wall_conc + slab_conc},
    {name:"型枠工", unit:"m²", val: wall_form + slab_form},
    {name:"栗石・砂利", unit:"m³", val: filter_vol},
    {name:"キャップコン", unit:"m³", val: cap_conc},
    {name:"水抜きパイプ", unit:"本", val: wall_h/1000 * p.L_total/1000 / 3}
  ];
}

// バリデーション
function validate(p) {
  const warnings = [];
  if (p.H_total !== p.H_above + p.Df) {
    warnings.push(`<div class="warning">⚠ 全高(${p.H_total}) ≠ 地上高(${p.H_above}) + 根入れ(${p.Df}) = ${p.H_above + p.Df}</div>`);
  }
  if (p.B < p.t_bot + p.toe) {
    warnings.push(`<div class="error">✗ 底版幅(${p.B}) < 壁底厚(${p.t_bot}) + つま先(${p.toe}) = ${p.t_bot + p.toe}</div>`);
  }
  if (p.t_top > p.t_bot) {
    warnings.push(`<div class="warning">⚠ 壁天端厚(${p.t_top}) > 底部厚(${p.t_bot}) のため逆テーパーになります</div>`);
  }
  if (p.H_above > 2000) {
    warnings.push(`<div class="warning">📋 H>2m: 建築確認申請が必要（建基法第88条）</div>`);
  }
  if (p.cover < 60 && p.H_above > 2000) {
    warnings.push(`<div class="warning">⚠ 千葉市標準等ではかぶり60mm以上が一般的</div>`);
  }
  if (p.cover < 40) {
    warnings.push(`<div class="error">✗ かぶり40mm未満は建基法令79条違反</div>`);
  }
  return warnings;
}

  // かぶり表記
  html += `<text x="${sox + p.cover}" y="${soy - 20}" text-anchor="middle" font-size="28" fill="#0055aa" font-weight="600">${p.cover}</text>
           <text x="${sox + p.cover}" y="${soy + p.slab_t + 35}" text-anchor="middle" font-size="28" fill="#0055aa" font-weight="600">${p.cover}</text>`;
  
  svg.innerHTML = html;
}

// ============================================================
// テーブル更新
// ============================================================

function renderTables(p, rebars, quantities) {
  // 鉄筋加工帳
  let html = '';
  let totalRebar = 0;
  rebars.forEach(r => {
    totalRebar += r.weight;
    html += `<tr>
      <td class="c"><b>${r.id}</b></td>
      <td class="c">${r.dia}</td>
      <td class="r">${r.len.toLocaleString()}</td>
      <td class="r">${r.count}</td>
      <td class="r">${r.weight.toFixed(1)}</td>
    </tr>`;
  });
  html += `<tr class="total"><td colspan="4" class="r">小計</td><td class="r">${totalRebar.toFixed(1)} kg</td></tr>`;
  html += `<tr class="grand"><td colspan="4" class="r">+10%余長</td><td class="r">${(totalRebar*1.1).toFixed(1)} kg</td></tr>`;
  document.getElementById('rebar-tbody').innerHTML = html;
  
  // 数量集計
  html = '';
  quantities.forEach(q => {
    html += `<tr>
      <td>${q.name}</td>
      <td class="c">${q.unit}</td>
      <td class="r">${(q.val / (p.L_total/1000)).toFixed(3)}</td>
      <td class="r">${q.val.toFixed(2)}</td>
    </tr>`;
  });
  document.getElementById('quantity-tbody').innerHTML = html;
  
  // 材料費
  const rebarTotal = totalRebar * 1.1;
  const concVol = quantities.find(q => q.name === "コンクリート本体").val;
  const formArea = quantities.find(q => q.name === "型枠工").val;
  const stoneVol = quantities.find(q => q.name === "栗石・砂利").val;
  const sutekonVol = quantities.find(q => q.name === "捨てコン(t=50)").val;
  const crushedVol = quantities.find(q => q.name === "砕石(C-40)").val;
  const capVol = quantities.find(q => q.name === "キャップコン").val;
  
  const costRebar = rebarTotal / 1000 * p.price_rebar;
  const costConc = concVol * p.price_conc;
  const costForm = formArea * p.price_form;
  const costStone = stoneVol * p.price_stone;
  const costSutekon = sutekonVol * (p.price_conc * 0.85);
  const costCrushed = crushedVol * 4500;
  const costCap = capVol * (p.price_conc * 0.85);
  
  const totalCost = costRebar + costConc + costForm + costStone + costSutekon + costCrushed + costCap;
  
  html = `
    <tr><td>鉄筋</td><td class="r">${rebarTotal.toFixed(0)}kg</td><td class="r">${(p.price_rebar/1000).toLocaleString()}/kg</td><td class="r">¥${Math.round(costRebar).toLocaleString()}</td></tr>
    <tr><td>コンクリート(本体)</td><td class="r">${concVol.toFixed(2)}m³</td><td class="r">${p.price_conc.toLocaleString()}</td><td class="r">¥${Math.round(costConc).toLocaleString()}</td></tr>
    <tr><td>型枠工</td><td class="r">${formArea.toFixed(2)}m²</td><td class="r">${p.price_form.toLocaleString()}</td><td class="r">¥${Math.round(costForm).toLocaleString()}</td></tr>
    <tr><td>栗石・砂利</td><td class="r">${stoneVol.toFixed(2)}m³</td><td class="r">${p.price_stone.toLocaleString()}</td><td class="r">¥${Math.round(costStone).toLocaleString()}</td></tr>
    <tr><td>捨てコン</td><td class="r">${sutekonVol.toFixed(2)}m³</td><td class="r">${Math.round(p.price_conc*0.85).toLocaleString()}</td><td class="r">¥${Math.round(costSutekon).toLocaleString()}</td></tr>
    <tr><td>砕石基礎</td><td class="r">${crushedVol.toFixed(2)}m³</td><td class="r">4,500</td><td class="r">¥${Math.round(costCrushed).toLocaleString()}</td></tr>
    <tr><td>キャップコン</td><td class="r">${capVol.toFixed(2)}m³</td><td class="r">${Math.round(p.price_conc*0.85).toLocaleString()}</td><td class="r">¥${Math.round(costCap).toLocaleString()}</td></tr>
    <tr class="grand"><td colspan="3" class="r">材料費合計</td><td class="r">¥${Math.round(totalCost).toLocaleString()}</td></tr>
  `;
  document.getElementById('cost-tbody').innerHTML = html;
  
  document.getElementById('total-cost').textContent = Math.round(totalCost).toLocaleString();
}

// ============================================================
// メイン更新ループ
// ============================================================

function update() {
  const p = getParams();
  const warnings = validate(p);
  document.getElementById('warnings').innerHTML = warnings.join('');
  
  const g = calcGeometry(p);
  const rebars = calcRebars(p, g);
  const quantities = calcQuantities(p, g);
  
  renderCrossSection(p, g, rebars);
  renderSlabDetail(p, g);
  renderTables(p, rebars, quantities);
}

// イベント
document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('input', update);
  el.addEventListener('change', update);
});

// 自動連動: H_above + Df = H_total
['H_above', 'Df'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const H_above = parseFloat(document.getElementById('H_above').value);
    const Df = parseFloat(document.getElementById('Df').value);
    document.getElementById('H_total').value = H_above + Df;
    update();
  });
});

function applyPreset(name) {
  const preset = PRESETS[name];
  if (!preset) return;
  Object.keys(preset).forEach(key => {
    const el = document.getElementById(key);
    if (el) el.value = preset[key];
  });
  // ボタンのアクティブ状態
  document.querySelectorAll('.preset-buttons button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  update();
}

function resetToDefault() {
  applyPreset('matiuke');
  document.querySelector('.preset-buttons button').classList.add('active');
}

// ============================================================
// JSON 入出力
// ============================================================

function exportJSON() {
  const p = getParams();
  const json = {
    type: "yoheki-cad",
    version: "0.1",
    created: new Date().toISOString(),
    parameters: p
  };
  const blob = new Blob([JSON.stringify(json, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `yoheki_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const json = JSON.parse(ev.target.result);
        if (json.parameters) {
          Object.keys(json.parameters).forEach(key => {
            const el = document.getElementById(key);
            if (el) el.value = json.parameters[key];
          });
          update();
          alert('読み込みました');
        }
      } catch (err) {
        alert('JSONの読み込みに失敗しました: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// 初期描画
update();
